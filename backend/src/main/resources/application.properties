# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/shopping_mall?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=3000ms

# JWT Configuration
jwt.secret=${JWT_SECRET:ZGVmYXVsdF9zZWNyZXRfa2V5X2Zvcl9kZXZlbG9wbWVudF9vbmx5X2FzX25vdGljZV9zaWNrX2tleQ==}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.header=${JWT_HEADER:Authorization}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Cross-Origin Configuration
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET, POST, PUT, DELETE, OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.exposed-headers=Authorization

# Rate Limiter configuration
resilience4j.ratelimiter.instances.api-rate-limiter.limit-for-period=100
resilience4j.ratelimiter.instances.api-rate-limiter.limit-refresh-period=1s
resilience4j.ratelimiter.instances.api-rate-limiter.timeout-duration=1000ms
resilience4j.ratelimiter.instances.login-rate-limiter.limit-for-period=100
resilience4j.ratelimiter.instances.login-rate-limiter.limit-refresh-period=1s
resilience4j.ratelimiter.instances.login-rate-limiter.timeout-duration=1000ms

# Logging Configuration
logging.level.com.shopping=DEBUG
logging.level.org.springframework=DEBUG
logging.level.org.hibernate=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type=TRACE
logging.level.org.springframework.jdbc.core=DEBUG
logging.level.org.springframework.orm.jpa=DEBUG
logging.level.com.shopping.repository=TRACE